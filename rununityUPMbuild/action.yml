name: "Run Single-Version Unity UPM Build"
description: "Validate and switch build target for a Unity UPM package using unity-cli."
author: "reality-collective"
inputs:
  repository:
    description: "Optional owner/repo of the UPM package to validate (defaults to current)"
    required: false
  unity-version:
    description: "Optional override Unity version (otherwise read from package.json 'unity')"
    required: false
  build-targets:
    description: "Comma-separated Unity build targets (e.g. StandaloneWindows64, StandaloneLinux64, StandaloneOSX, Android, iOS, VisionOS)"
    required: true
  dependencies:
    description: "JSON array of dependency objects: [{\"DependencyBranch\": \"domain/repo.git\"}]"
    required: false

runs:
  using: "composite"
  steps:
    - name: Script Version
      id: init
      run: |
        echo "::group::Script Versioning"
        $scriptVersion = "2.0.0"
        echo "Build Script Version: $scriptVersion"
        $workflowWorkspace = Get-Location
        echo "workflow-workspace=$workflowWorkspace" >> $env:GITHUB_OUTPUT
        echo "::endgroup::"
      shell: pwsh
    - name: Checkout (target or self)
      uses: actions/checkout@v5
      with:
        repository: ${{ inputs.repository }}
        submodules: recursive
        clean: true
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 20
    - name: Install unity-cli
      run: |
        echo "::group::Install unity-cli"
        npm install -g @rage-against-the-pixel/unity-cli
        unity-cli --help > NUL 2>&1 || exit 1
        echo "unity-cli installed"
        echo "::endgroup::"
      shell: pwsh
    - name: Derive Unity Version
      id: derive
      run: |
        echo "::group::Derive Unity Version"
        $override = '${{ inputs.unity-version }}'
        $pkgPath = Join-Path (Get-Location) 'package.json'
        if(-not (Test-Path $pkgPath)) { Write-Error "package.json not found at repo root"; exit 1 }
        $pkg = Get-Content -Path $pkgPath | ConvertFrom-Json
        $derived = $pkg.unity
        if([string]::IsNullOrEmpty($derived) -and [string]::IsNullOrEmpty($override)) { Write-Error "No unity version found (package.json lacks 'unity' and no override provided)."; exit 1 }
        $unityVersion = if([string]::IsNullOrEmpty($override)) { $derived } else { $override }
        echo "Using Unity Version: $unityVersion"
        echo "unity-version=$unityVersion" >> $env:GITHUB_OUTPUT
        echo "::endgroup::"
      shell: pwsh
    - name: Create Temp Unity Project
      id: project
      run: |
        echo "::group::Create Temp Unity Project"
        $unityVersion = '${{ steps.derive.outputs.unity-version }}'
        $create = unity-cli create-project --name P --unity-version $unityVersion --json
        $jsonLine = ($create | Select-Object -Last 1)
        $projInfo = $jsonLine | ConvertFrom-Json
        $projectPath = $projInfo.projectPath
        if([string]::IsNullOrEmpty($projectPath) -or -not (Test-Path $projectPath)) { Write-Error "Project creation failed"; exit 1 }
        echo "UNITY_PROJECT_PATH=$projectPath" >> $env:GITHUB_ENV
        echo "project-path=$projectPath" >> $env:GITHUB_OUTPUT
        echo "::endgroup::"
      shell: pwsh
    - name: Move Package into Project Packages folder
      run: |
        echo "::group::Move Package"
        $projectPath = '${{ steps.project.outputs.project-path }}'
        $pkgJson = Get-Content package.json | ConvertFrom-Json
        $packageName = $pkgJson.name
        if([string]::IsNullOrEmpty($packageName)) { Write-Error "Package name missing in package.json"; exit 1 }
        $packagesDir = Join-Path $projectPath 'Packages'
        $targetDir = Join-Path $packagesDir $packageName
        if(Test-Path $targetDir) { Remove-Item $targetDir -Recurse -Force }
        New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
        Get-ChildItem -Force | Where-Object { $_.Name -notin @('.git','.github','Logs') } | ForEach-Object { Copy-Item $_.FullName -Destination $targetDir -Recurse -Force }
        echo "Package placed at: $targetDir"
        echo "::endgroup::"
      shell: pwsh
    - name: Clone Dependencies (optional)
      if: ${{ inputs.dependencies != '' }}
      run: |
        echo "::group::Clone Dependencies"
        $projectPath = '${{ steps.project.outputs.project-path }}'
        $packagesDir = Join-Path $projectPath 'Packages'
        $dependencies = '${{ inputs.dependencies }}'
        $JSONdependencies = $dependencies | ConvertFrom-Json
        $manifestPath = Join-Path $packagesDir 'manifest.json'
        $manifest = Get-Content $manifestPath | ConvertFrom-Json
        $existing = $manifest.dependencies.PsObject.Properties | ForEach-Object {"$($_.Name)@$($_.Value),"}
        foreach($dependency in $JSONdependencies){
          $dependency.PsObject.Properties | ForEach-Object {
            $depName = $_.Name
            $depUrl = $_.Value
            $depPath = $depName.Replace('/','_')
            $cloneURL = "https://${{ github.actor }}:${{ github.token }}@$depUrl"
            echo "Cloning $depName from $depUrl"
            git clone -b $depName --single-branch $cloneURL $depPath
            if(-not (Test-Path $depPath)) { Write-Error "Failed to clone $depName"; exit 1 }
            if(Test-Path "$depPath/package.json") {
              $depPkg = Get-Content "$depPath/package.json" | ConvertFrom-Json
              $realName = $depPkg.name
              Rename-Item $depPath $realName
              Move-Item $realName -Destination $packagesDir
            } else {
              Move-Item "$depPath/*" -Destination $packagesDir
            }
            if (Test-Path "$packagesDir/$depName.json") {
              $depManifest = Get-Content "$packagesDir/$depName.json" | ConvertFrom-Json
              $depManifest.dependencies.PsObject.Properties | ForEach-Object { $existing += "$($_.Name)@$($_.Value)," }
            }
          }
        }
        $existing = $existing.Trim(',') | ConvertTo-Json
        $existing = $existing.Replace('@','":"').Replace('[','{').Replace(']','}')
        $newDepsObject = $existing | ConvertFrom-Json
        $manifest.dependencies = $newDepsObject
        $manifest | ConvertTo-Json | Set-Content $manifestPath
        echo "Dependencies updated in manifest.json"
        echo "::endgroup::"
      shell: pwsh
    - name: Run Unity (switch build targets)
      id: run
      run: |
        echo "::group::Run Unity headless for multiple build targets"
        $unityVersion = '${{ steps.derive.outputs.unity-version }}'
        $projectPath = '${{ steps.project.outputs.project-path }}'
        $workflowWorkspace = '${{ steps.init.outputs.workflow-workspace }}'
        $logsDir = Join-Path $workflowWorkspace "Logs"
        if(Test-Path $logsDir){ Remove-Item $logsDir -Recurse -Force }
        New-Item -ItemType Directory -Force -Path $logsDir | Out-Null
        
        $buildTargetsInput = '${{ inputs.build-targets }}'
        $buildTargets = $buildTargetsInput -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne '' }
        
        echo "Processing $($buildTargets.Count) build target(s): $($buildTargets -join ', ')"
        
        $allLogFiles = @()
        foreach($buildTarget in $buildTargets) {
          echo "::group::Building for $buildTarget"
          $date = Get-Date -Format "yyyyMMddTHHmmss"
          $logFile = Join-Path $logsDir "${unityVersion}_${buildTarget}_${date}.log"
          echo "Running Unity with build target: $buildTarget"
          unity-cli run --unity-project $projectPath -quit -batchmode -nographics -buildTarget $buildTarget -logFile $logFile
          if($LASTEXITCODE -ne 0) { 
            Write-Error "Unity run failed for $buildTarget (exit $LASTEXITCODE)"
            echo "::endgroup::"
            exit $LASTEXITCODE
          }
          $allLogFiles += $logFile
          echo "Successfully completed build target: $buildTarget"
          echo "::endgroup::"
        }
        
        $logFilesList = $allLogFiles -join ','
        echo "log-files=$logFilesList" >> $env:GITHUB_OUTPUT
        echo "::endgroup::"
      shell: pwsh
    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unity-build-logs-${{ steps.derive.outputs.unity-version }}
        path: Logs/**
