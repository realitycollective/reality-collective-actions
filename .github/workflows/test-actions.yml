name: Test Composite Actions

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Ensure default token scopes and inherit org-level secrets via env mapping
permissions:
  contents: write
  packages: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GIT_PAT: ${{ secrets.GIT_PAT }}

jobs:
  test-unity-build:
    name: Test Unity UPM Build
    runs-on: ${{ matrix.os }}
    if: always()
    continue-on-error: true
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        unity-version:
          - 6000
        include:
          - os: ubuntu-latest
            build-targets: StandaloneLinux64, Android, iOS
            modules: linux-server
          - os: windows-latest
            build-targets: StandaloneWindows64, Android, WSAPlayer
            modules: windows-server
          - os: macos-latest
            build-targets: StandaloneOSX, Android, iOS, VisionOS
            modules: mac-server
    steps:
      - name: Checkout Actions (composite source)
        uses: actions/checkout@v5
      
      - name: Run Unity UPM Build (unity-cli)
        uses: ./rununityUPMbuild
        with:
          unity-version: ${{ matrix.unity-version }}
          build-targets: ${{ matrix.build-targets }}
          license-type: Personal
          email: ${{ secrets.UNITY_USER }}
          password: ${{ secrets.UNITY_ACC }}
        continue-on-error: true