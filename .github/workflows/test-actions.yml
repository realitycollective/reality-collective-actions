name: Test Composite Actions

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Ensure default token scopes and inherit org-level secrets via env mapping
permissions:
  contents: write
  packages: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GIT_PAT: ${{ secrets.GIT_PAT }}

jobs:
  test-unity-build:
    name: Test Unity UPM Build
    runs-on: ${{ matrix.os }}
    if: always()
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            unity-version: 6000
            build-target: Android
          - os: windows
            unity-version: 6000
            build-target: StandaloneWindows64
          - os: windows
            unity-version: 6000
            build-target: WSAPlayer
          - os: macos
            unity-version: 6000
            build-target: iOS
          - os: macos
            unity-version: 6000
            build-target: StandaloneOSX
    steps:
      - name: Checkout Actions (composite source)
        uses: actions/checkout@v5

      - name: Run Unity UPM Build (unity-cli)
        uses: ./rununityUPMbuild
        with:
          repository: realitycollective/com.realitycollective.package-test
          unity-version: ${{ matrix.unity-version }}
          build-target: ${{ matrix.build-target }}
        continue-on-error: true

      - name: Check Build Logs
        run: |
          if (Test-Path "Logs") {
            Write-Host "Build logs generated successfully"
            Get-ChildItem -Path "Logs" -Recurse
          } else {
            Write-Host "No build logs found"
          }
        shell: pwsh
        continue-on-error: true
